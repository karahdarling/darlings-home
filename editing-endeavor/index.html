<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Editing Endeavor Dashboard</title>
<link rel="apple-touch-icon" href="../icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="../icon-512.png">
<style>
body{margin:0;background:#FFF9F4;color:#4A3228;font-family:'Avenir Next','Avenir','Trebuchet MS',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.gate{text-align:center;padding:32px;max-width:340px;width:100%;}
.gate .ring{width:96px;height:96px;border-radius:50%;background:#F6DFE5;border:2px solid #F0CBD6;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;}
.gate .ring span{font-family:Baskerville,Georgia,serif;font-style:italic;font-weight:bold;font-size:52px;color:#A64D69;}
.gate h1{font-weight:300;font-size:19px;color:#7A5C4C;margin:0 0 4px;}
.gate p{font-size:12px;color:#B49A8C;margin:0 0 20px;}
.gate input{width:100%;box-sizing:border-box;padding:11px 14px;border:1.5px solid #F0CBD6;border-radius:12px;background:#FFFDFB;font-size:15px;color:#4A3228;outline:none;text-align:center;}
.gate input:focus{border-color:#D98CA4;}
.gate button{margin-top:12px;width:100%;padding:11px;border:none;border-radius:12px;background:#A64D69;color:#FFF;font-size:14px;font-weight:600;cursor:pointer;}
.gate .err{color:#9E2F47;font-size:12px;height:16px;margin-top:10px;}
.shake{animation:sh .35s;}
@keyframes sh{20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>
<div class="gate" id="gate">
<div class="ring"><span>D</span></div>
<h1>A word from you, Darling…</h1>
<p>this page is sealed with a kiss and a cipher</p>
<input type="password" id="pw" placeholder="the magic word" autocomplete="current-password">
<button onclick="tryUnlock()">Unlock</button>
<div class="err" id="err"></div>
</div>

const b2a=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function deriveKey(pass){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},true,['decrypt']);
}
async function open_(key){
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(IV)},key,b2a(CT));
  const html=new TextDecoder().decode(pt);
  document.open();document.write(html);document.close();
}
async function tryUnlock(){
  const pass=document.getElementById('pw').value;
  try{
    const key=await deriveKey(pass);
    const raw=btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.exportKey('raw',key))));
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(IV)},key,b2a(CT));
    try{localStorage.setItem('dh_vault_key',raw);}catch(e){}
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){
    const g=document.getElementById('gate');g.classList.remove('shake');void g.offsetWidth;g.classList.add('shake');
    document.getElementById('err').textContent='not quite, darling — try again';
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
async function auto(){
  let raw=null;try{raw=localStorage.getItem('dh_vault_key');}catch(e){}
  if(!raw)return;
  document.documentElement.style.visibility='hidden';
  try{
    const key=await crypto.subtle.importKey('raw',b2a(raw),{name:'AES-GCM'},false,['decrypt']);
    await open_(key);
  }catch(e){
    document.documentElement.style.visibility='';
    try{localStorage.removeItem('dh_vault_key');}catch(_){}
  }
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',auto);}else{auto();}
